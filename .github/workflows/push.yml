name: Pixel Icon Provider push CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - v*
  workflow_dispatch: # 允许你随时在网页上手动点按钮打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Android SDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          arguments: assembleRelease

      # 动态提取版本号：如果是 Tag 就用 Tag 名，如果是普通 push 就用 commit 简写
      - name: Save version tag in env
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=snapshot-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      # 核心修改 1：为你自己的固定证书进行 APK 签名（去除了原官方仓库的限制条件）
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1.2.4
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 核心修改 2：重命名并计算 SHA256 校验和
      - name: Prepare APKs with checksums
        run: |
          set -e
          mv app/build/outputs/apk/release/app-release-unsigned-signed.apk pixel-icon-provider-${{ env.VERSION_TAG }}.apk
          sha256=`sha256sum pixel-icon-provider-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_SHA256=$sha256" >> $GITHUB_ENV

      # 核心修改 3：无论通过什么方式触发，都把打包好的固定签名 APK 上传到 Artifacts（最方便下载）
      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel-icon-provider-${{ env.VERSION_TAG }}
          path: pixel-icon-provider-${{ env.VERSION_TAG }}.apk

      # 核心修改 4：只有当你推送 v* 标签时，才在你的 fork 仓库里创建 GitHub Release 草稿
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Pixel Icon Provider ${{ env.VERSION_TAG }}
          body: |
            Custom build with modified icon assets.

            ---

            ### Checksum

            `${{ env.APK_SHA256 }}`
          files: |
            pixel-icon-provider-${{ env.VERSION_TAG }}.apk
          draft: true
          prerelease: false
